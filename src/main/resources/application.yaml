spring:
  application:
    name: identity-api

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/identity_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

tesseract:
  datapath: C:/Users/Rafael/AppData/Local/Programs/Tesseract-OCR/tessdata
